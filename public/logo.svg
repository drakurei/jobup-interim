<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 70" fill="none">
  <defs>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F5F5"/>
      <stop offset="100%" stop-color="#9E9E9E"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="figs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64B5F6"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
  </defs>

  <!-- 3 figures montantes (gauche) -->
  <g transform="translate(0,8)">
    <circle cx="10" cy="22" r="3" fill="url(#figs)"/>
    <rect x="7" y="26" width="6" height="14" rx="2" fill="url(#figs)"/>
    <circle cx="22" cy="16" r="3.5" fill="url(#figs)"/>
    <rect x="18.5" y="20" width="7" height="20" rx="2" fill="url(#figs)"/>
    <circle cx="36" cy="10" r="4" fill="url(#figs)"/>
    <rect x="32" y="14" width="8" height="26" rx="2" fill="url(#figs)"/>
    <!-- flèche -->
    <path d="M2 44 Q 22 24 44 8" stroke="#2196F3" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M44 8 L 38 8 M44 8 L 44 14" stroke="#2196F3" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- JOB UP -->
  <text x="56" y="42" font-family="Space Grotesk, sans-serif" font-weight="800" font-size="34" letter-spacing="-1" fill="url(#silver)">JOB</text>
  <text x="118" y="42" font-family="Space Grotesk, sans-serif" font-weight="800" font-size="34" letter-spacing="-1" fill="url(#blue)">UP</text>

  <!-- INTÉRIM -->
  <text x="58" y="60" font-family="Inter, sans-serif" font-weight="600" font-size="12" letter-spacing="3" fill="#FFFFFF">INTÉRIM</text>

  <!-- ligne -->
  <line x1="56" y1="48" x2="166" y2="48" stroke="#2196F3" stroke-width="1.5"/>
</svg>
